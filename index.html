<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>LeadForge AI</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #0b1220;
            color: #e2e8f0;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        .card {
            max-width: 500px;
            background: #0f172a;
            border-radius: 24px;
            padding: 40px;
            text-align: center;
            box-shadow: 0 25px 50px -12px rgba(0,0,0,0.5);
            border: 1px solid #1f2937;
        }
        .icon {
            font-size: 64px;
            color: #3b82f6;
            margin-bottom: 20px;
        }
        h1 {
            font-size: 28px;
            margin-bottom: 12px;
        }
        p {
            color: #94a3b8;
            margin-bottom: 24px;
        }
        .timer {
            font-size: 48px;
            font-weight: 800;
            color: #3b82f6;
            margin: 20px 0;
        }
        .btn {
            display: inline-block;
            background: #2563eb;
            color: white;
            padding: 12px 24px;
            border-radius: 40px;
            text-decoration: none;
            margin-top: 20px;
        }
        .btn:hover {
            background: #1d4ed8;
        }
        .footer {
            margin-top: 30px;
            font-size: 12px;
            color: #64748b;
        }
    </style>
</head>
<body>
<div class="card">
    <div class="icon">
        <i class="fa-solid fa-bolt"></i>
    </div>
    <h1>LeadForge AI</h1>
    <p>AI-powered lead scoring for sales teams.</p>
    <div class="timer">
        <span id="countdown">5</span>
    </div>
    <p>Redirecting you to the app...</p>
    <a href="https://robodata74.github.io/LeadForgeAI/" class="btn">Click if not redirected</a>
    <div class="footer">
        © 2026 LeadForge AI
    </div>
</div>
<script>
    let seconds = 5;
    const timerElement = document.getElementById('countdown');
    const interval = setInterval(() => {
        seconds--;
        timerElement.textContent = seconds;
        if (seconds <= 0) {
            clearInterval(interval);
            window.location.href = 'https://robodata74.github.io/LeadForgeAI/';
        }
    }, 1000);
</script>
</body>
</html>
